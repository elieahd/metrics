<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Metrics Report</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            padding: 40px;
        }

        .header {
            border-bottom: 2px solid #333;
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        .label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 8px;
        }

        .project-name {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .generated-at {
            font-size: 11px;
            color: #444;
            margin-top: 8px;
        }

        .section-title {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 20px;
        }

        .repo-card {
            background-color: #161616;
            border: 1px solid #222;
            border-left: 3px solid #4a9eff;
            padding: 20px 24px;
            margin-bottom: 16px;
        }

        .repo-name {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 14px;
        }

        .stats {
            display: block;
        }

        .stat {
            display: inline-block;
            margin-right: 32px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #4a9eff;
        }

        .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
            margin-top: 2px;
        }

        .footer {
            margin-top: 48px;
            padding-top: 16px;
            border-top: 1px solid #1e1e1e;
            font-size: 10px;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="label">Dev Metrics — Project Report</div>
    <div class="project-name" th:text="${project.name()}">Project Name</div>
    <div class="generated-at" th:text="'Generated on ' + ${#dates.format(#dates.createNow(), 'dd MMM yyyy HH:mm')}">Generated on 01 Jan 2025 14:30</div>
</div>

<!-- Repositories -->
<div class="section-title">Repositories</div>

<div th:each="repo : ${project.repositories()}">
    <div class="repo-card">
        <div class="repo-name" th:text="${repo.name()}">repository-name</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" th:text="${#lists.size(repo.pullRequests())}">0</div>
                <div class="stat-label">Pull Requests</div>
            </div>
            <div class="stat">
                <div class="stat-value" th:text="${#lists.size(repo.releases())}">0</div>
                <div class="stat-label">Releases</div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    devt metrics — auto-generated report
</div>

</body>
</html>

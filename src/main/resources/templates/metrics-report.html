<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${project.name() + ' Report'}">Project Report</title>
    <style>
        @page {
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            color: #e6edf3;
            font-family: Arial, Helvetica, sans-serif;
            background: #0d1117;
            padding: 48px 32px;
        }

        .w-100 {
            width: 100%;
        }

        .mt-xs {
            margin: 10px;
        }

        .mb-s {
            margin-bottom: 10px;
        }

        .mt-s {
            margin-top: 10px;
        }

        .ml-xs {
            margin-left: 5px;
        }

        .ml-s {
            margin-left: 15px;
        }

        .mr-s {
            margin-right: 10px;
        }

        .ml-m {
            margin-left: 30px;
        }

        .code {
            font-size: 14px;
            font-weight: bold;
            font-family: 'monospace';
        }

        .center {
            text-align: center;
        }

        .right {
            text-align: right;
        }


        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .right {
            white-space: nowrap;
            margin-left: 1rem;
        }


        /** COLORS **/

        .blue {
            color: #58a6ff;
        }

        .orange {
            color: #d29922;
        }

        .green {
            color: #3fb950;
        }

        .purple {
            color: #bc8cff;
        }

        .red {
            color: #f85149;
        }

        .pill {
            display: inline-block;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: bold;
        }

        .pill-orange {
            background: #2d2008;
            color: #d29922;
            border: 1px solid #5a3e0a;
        }

        .pill-green {
            background: #0d2414;
            color: #3fb950;
            border: 1px solid #1a4d26;
        }

        .pill-red {
            background: #3d0c09;
            color: #f85149;
            border: 1px solid #6d1a16;
        }

        .pill-purple {
            background: #1e0d33;
            color: #bc8cff;
            border: 1px solid #4a2080;
        }

        .pill-blue {
            background: #1f2d3d;
            color: #58a6ff;
            border: 1px solid #203680;
        }

        .pill-gray {
            background: #1c1c1c;
            color: #8b949e;
            border: 1px solid #30363d;
        }

        .subtext {
            font-size: 12px;
            color: #8b949e;
        }

        .badge {
            background: #1f2d3d;
            color: #58a6ff;
            border: 1px solid #58a6ff;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
        }

        /** SECTIONS **/
        .page-break {
            page-break-before: always;
            padding-top: 48px;
        }

        .section {
            margin-bottom: 30px;
        }

        .header {
            font-size: 36px;
            font-weight: bold;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 18px;
            font-weight: bold;
        }

        .legend {
            font-size: 12px;
            color: #8a8a9a;
        }

        .bottom-line {
            margin-top: 24px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #21262d;
        }

        /** TABLE **/
        .table {
            width: 100%;
        }

        .table td {
            padding: 7px 10px;
        }

        .table-header {
            width: 100%;
            border-collapse: collapse;
            border-bottom: 1px solid #21262d;
        }

        .table-header td {
            padding: 14px 20px;
            vertical-align: middle;
            border: none;
            background: transparent;
            color: inherit;
        }

        .table-header-title {
            font-weight: bold;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .table-container {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            overflow: hidden;
        }

        .table-data {
            width: 100%;
            border-collapse: collapse;
        }

        .table-data thead th {
            padding: 12px 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            text-align: left;
            border-bottom: 1px solid #21262d;
        }

        .table-data thead th.center {
            text-align: center;
        }

        .table-data tbody tr:last-child {
            border-bottom: none;
        }

        .table-data td {
            padding: 8px 14px;
            font-size: 14px;
            vertical-align: middle;
            color: #e6edf3;
            border: none;
            background: transparent;
        }

        .no-data {
            text-align: center;
            padding: 16px 10px;
            color: #8b949e;
            font-size: 13px;
        }

        /** NOTES **/

        .note {
            background: #161b22;
            border: 1px solid #30363d;
            border-left: 4px solid #8b949e;
            border-radius: 6px;
            padding: 16px 20px;
        }

        /** STATS **/

        .stats-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 12px;
            table-layout: fixed;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 16px 20px;
            vertical-align: top;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8a8a9a;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: bold;
        }

        .bar-value-cell {
            white-space: nowrap;
            margin-left: 12px;
            width: 40px;
        }

        .bar-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 6px;
        }

        .bar-table td {
            padding: 0;
            border: none;
            background: transparent;
            vertical-align: middle;
        }

        .bar-bg {
            height: 10px;
            border-radius: 5px;
            background: #21262d;
            width: 100%;
        }

        .bar-fill {
            height: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<!-- 1. Summary (header + notice + global stats + repository global stats) -->
<div th:replace="~{fragments/layout.html :: header}"/>
<div th:replace="~{fragments/notes.html :: notice}"/>
<div th:replace="~{fragments/overview.html :: stats}"/>
<div th:replace="~{fragments/overview.html :: repositories}"/>

<!-- 2. Overview page for each Repository (releases, pipelines, pull requests) -->
<div class="page-break" th:each="repo : ${project.repositories()}">
    <div th:replace="~{fragments/repository.html :: repository}"/>
</div>

<!-- 3. Contributions -->
<div th:replace="~{fragments/contributions.html :: contributions}"/>

<!-- 4. Deployments -->
<div th:replace="~{fragments/deployments.html :: deployments}"/>
</body>
</html>
